<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>03_Exercise</title>
</head>
<body>
    <h1>Course Landing Page</h1>
    <form action="">
        <div>
            <label for="CourseTitle">Course Title</label>
            <input type="text" id="CourseTitle" name="CourseTitle" placeholder="e.g. CSE" required>
        </div>
        
        <div>
            <div>
                <label for="CourseDesc">Course Description</label>
            </div>
            <textarea name="Course Description" id="CourseDesc" cols="20" rows="5" placeholder="I have choosen..." required></textarea>
        </div>
        
        <div>
            <label for="SkillLever">Skill Lever</label>
            <select name="SkillLever" id="SkillLever">
                <option value="Beginner">Beginner</option>
                <option value="Intermediate">Intermediate</option>
                <option value="Expert">Expert</option>
            </select>
        </div>
       
        <div>
            <label for="confirm">Ready to submit the course?</label>
            <input type="checkbox" id="confirm" name="confirmation" required>
        </div>
        <div>
            <button>Submit</button>
        </div>
    </form>
</body>
</html>
